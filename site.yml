# ===============================================================================
# This is the main site-wide playbook. It includes common provisioning tasks
# as well as individual system playbooks for specific server roles.
# USE WITH CAUTION: Modifying this file can impact the entire infrastructure.
# It's the whole magilla.

---

# Common Server Provisioning
- name: Ubuntu 24.04 Common Provisioning Tasks
  hosts: linux_servers
  gather_facts: true
  become: true
  roles:
    - role: provision_ubuntu_2404
      when:
        - ansible_distribution == "Ubuntu"
        - ansible_distribution_version == "24.04"
      tags: [provision, system]

# Docker Provisioning
- name: Docker Provisioning Tasks
  hosts: docker
  gather_facts: true
  become: true
  roles:
    - role: docker_engine
      tags: [provision, docker]

# Pi-hole Deployment
- name: Deploy pihole-01 and pihole-02
  hosts: pihole
  become: true
  roles:
    - role: pihole_v6
      tags: [infra, services, dns]

# Kubernetes Cluster Deployment
- name: Deploy Kubernetes Cluster
  hosts: kubernetes
  gather_facts: true
  become: true
  serial: 1  # Process nodes one at a time for proper cluster join ordering
  roles:
    - role: kubernetes
      tags: [kubernetes, k8s]

# Kubernetes Workloads Deployment
- name: Deploy Kubernetes Workloads
  hosts: kubernetes
  gather_facts: false
  become: true
  tasks:
    - name: Deploy Homepage through k8s_homepage role
      ansible.builtin.import_role:
        name: k8s_homepage
      run_once: true
      tags: [k8s_homepage, homepage]

    - name: Deploy arrstack workloads through k8s-arrstack role
      ansible.builtin.import_role:
        name: k8s-arrstack
      run_once: true
      tags: [k8s-arrstack, workloads, arrstack, sonarr]

    - name: Deploy Paperless stack through k8s-paperless role
      ansible.builtin.import_role:
        name: k8s-paperless
      run_once: true
      tags: [k8s-paperless, workloads, paperless]
